services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # image: seu-usuario/microservice-hostinger-api:latest  # use esta linha se já tiver a imagem publicada
    ports:
      - "8000:8000"
    environment:
      APP_KEY: ${APP_KEY:-}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-/var/www/html/database/database.sqlite}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      LOG_CHANNEL: stderr
    volumes:
      - ./.env:/var/www/html/.env
      - db_data:/var/www/html/database
      - storage_data:/var/www/html/storage
    command: >
      sh -c "[ -z \"$$APP_KEY\" ] && php artisan key:generate;
             php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - default
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "about", "--only=environment"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db_data:
  storage_data:

networks:
  default:
    driver: bridge
  proxy:
    external: true
    name: ${EXTERNAL_NETWORK:-bridge}
