services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_WORKDIR: ${APP_WORKDIR:-/var/www/html}
    # image: seu-usuario/microservice-hostinger-api:latest  # use esta linha se já tiver a imagem publicada
    expose:
      - "9000"
    environment:
      APP_KEY: ${APP_KEY:-}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: ${DB_CONNECTION:-sqlite}
      DB_DATABASE: ${DB_DATABASE:-${APP_WORKDIR:-/var/www/html}/database/database.sqlite}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      LOG_CHANNEL: stderr
      # Database — configure conforme seu ambiente:
      # DB_CONNECTION: mysql
      # DB_HOST: seu-host
      # DB_PORT: 3306
      # DB_DATABASE: seu-banco
      # DB_USERNAME: seu-usuario
      # DB_PASSWORD: sua-senha
    volumes:
      - ./.env:${APP_WORKDIR:-/var/www/html}/.env
      - storage_data:${APP_WORKDIR:-/var/www/html}/storage
    networks:
      - default
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'test is successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  storage_data:

networks:
  default:
    driver: bridge
  proxy:
    external: true
    name: ${EXTERNAL_NETWORK:-bridge}
